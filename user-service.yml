server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/user_service_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  cloud:
    config:
      uri: http://localhost:8888

feign:
  client:
    config:
      video-service:
        connect-timeout: 5000
        read-timeout: 5000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/