server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
        - id: video-service
          uri: lb://video-service
          predicates:
            - Path=/videos/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/