server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/video_service_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/